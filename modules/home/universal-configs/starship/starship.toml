command_timeout = 1000
#format = """
#[ÔĽşÔöÇuserÔöÇÔöÇÔöÇÔŁ»](bold blue) $username
#[ÔöúÔöÇsystemÔöÇÔŁ»](bold yellow) $hostname
#[ÔöúÔöÇprojectÔŁ»](bold red) $directory$rust$git_branch$git_state$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[ÔĽ░ÔöÇcmdÔöÇÔöÇÔöÇÔöÇÔŁ»](bold green)
#"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '@[$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "ÔŁ»" symbol in the prompt with "Ô×ť"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ÔŁ»](bold green)"     # The "success_symbol" segment is being set to "Ô×ť" with the color "bold green"
error_symbol = "[´ÇŹ](bold red)"

# ´öÂ ´ö┤
# configure directory
[directory]
read_only = " ˇ░łí"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "ţîŻ  "

[conda]
symbol = "´äî "

[dart]
symbol = "ţ×ś "

#[directory]
#read_only = " ´áŻ"

[docker_context]
symbol = "´îł "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "ţëÁ "

[elm]
symbol = "ţśČ "

[git_branch]
symbol = "´Éś "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

